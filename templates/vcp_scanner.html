<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMMS-VCP Breakout Scanner | India</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .watchlist-container {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid #334155;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #0f172a;
            padding: 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.05em;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid #334155;
            font-size: 0.9375rem;
        }

        .ticker {
            font-weight: 600;
            color: var(--primary);
        }

        .tag-pill {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .tag-breakout {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .tag-high {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(99, 102, 241, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            padding: 2rem;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            color: var(--text-dim);
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--text);
        }

        .detail-section {
            margin-top: 1.5rem;
            background: rgba(30, 41, 59, 0.5);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .pass-icon {
            color: var(--success);
            font-weight: bold;
        }

        .fail-icon {
            color: var(--danger);
            font-weight: bold;
        }

        .clickable-ticker {
            cursor: pointer;
            text-decoration: underline;
            text-decoration-style: dotted;
            color: #818cf8;
            transition: color 0.2s;
        }

        .clickable-ticker:hover {
            color: #6366f1;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">SMMS-VCP AI Scanner</div>
            <div id="update-info" style="font-size: 0.8rem; color: var(--text-dim);"></div>
            <a href="/" class="btn" style="text-decoration: none;">Back to Home</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Nifty 50 Trend</div>
                <div id="nifty-trend" class="stat-value">Loading...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Top Sector</div>
                <div id="top-sector" class="stat-value">Loading...</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Scans</div>
                <div class="stat-value">250 Stocks</div>
            </div>
        </div>

        <h2 style="margin-bottom: 1.5rem;">🔥 Top 10 Breakout Watchlist</h2>
        <div class="watchlist-container">
            <table id="vcp-table">
                <thead>
                    <tr>
                        <th>Stock</th>
                        <th>Tag</th>
                        <th>Price</th>
                        <th>Resistance</th>
                        <th>Buy Info</th>
                        <th>Target (15-40%)</th>
                        <th>Stop Loss</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="vcp-body">
                    <!-- Data here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Strategy Details Modal -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTicker" style="margin-bottom: 0.5rem; color: #818cf8;">Ticker</h2>
            <p id="modalScore" style="color: var(--text-dim); margin-bottom: 1.5rem;">Score: 0/7</p>
            <div id="modalDetails">
                <!-- Dynamic content will be injected here -->
            </div>
        </div>
    </div>

    <div id="loading" class="loading-overlay">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <p style="margin-top: 1rem;">Scanning Nifty 250 Market...<br><small>This may take 30-60 seconds</small></p>
        </div>
    </div>

    <script>
        let allStocksData = []; // Store globally for modal access

        function formatCheck(passed) {
            return passed ? '<span class="pass-icon">✓ PASS</span>' : '<span class="fail-icon">✗ FAIL</span>';
        }

        function showDetails(ticker) {
            const stock = allStocksData.find(s => s.ticker === ticker);
            if (!stock || !stock.details) return;

            document.getElementById('modalTicker').textContent = stock.ticker + ' Strategy Details';
            document.getElementById('modalScore').textContent = `Total VCP Score: ${stock.score}/${stock.max_score} | Current Price: ₹${stock.price}`;

            const d = stock.details;
            let html = '';

            // Trend Section
            if (d.trend) {
                html += `
                <div class="detail-section">
                    <h3 style="margin-bottom: 0.8rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">1. Market Trend</h3>
                    <div class="detail-row"><span>Status</span> <span>${formatCheck(d.trend.pass)}</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">Condition</span> <span>Price > 50 DMA</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">Current Price</span> <span>₹${d.trend.current_price}</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">50 DMA</span> <span>₹${d.trend.sma50}</span></div>
                </div>`;
            }

            // Resistance Section
            if (d.resistance) {
                html += `
                <div class="detail-section">
                    <h3 style="margin-bottom: 0.8rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">2. Base & Resistance</h3>
                    <div class="detail-row"><span>Proximity Check Status (< 15% away)</span> <span>${formatCheck(d.resistance.pass)}</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">Resistance Level</span> <span>₹${d.resistance.level}</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">Distance from Resistance</span> <span>${Math.abs(d.resistance.pct_below)}%</span></div>
                </div>`;
            }

            // VCP Contraction Section
            if (d.vcp) {
                html += `
                <div class="detail-section">
                    <h3 style="margin-bottom: 0.8rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">3. Volatility Contraction (VCP)</h3>
                    <div class="detail-row"><span>Contraction Status</span> <span>${formatCheck(d.vcp.pass)}</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">Tightness Score</span> <span>${d.vcp.tightness} / 2 points</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">Vol Contraction Stages (%)</span> <span>${d.vcp.vol_stages ? d.vcp.vol_stages.join(' → ') : 'N/A'}</span></div>
                </div>`;
            }

            // Volume Contraction Section
            if (d.volume) {
                html += `
                <div class="detail-section">
                    <h3 style="margin-bottom: 0.8rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem;">4. Volume Dry-up</h3>
                    <div class="detail-row"><span>Volume Status</span> <span>${formatCheck(d.volume.pass)}</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">Condition</span> <span>20d Avg Vol < 50d Avg Vol</span></div>
                    <div class="detail-row"><span style="color: var(--text-dim);">20d / 50d Ratio</span> <span>${d.volume.ratio}x</span></div>
                </div>`;
            }

            document.getElementById('modalDetails').innerHTML = html;
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detailsModal').style.display = 'none';
        }

        // Close modal when clicking outside of it
        window.onclick = function (event) {
            const modal = document.getElementById('detailsModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        async function fetchResults() {
            const loading = document.getElementById('loading');
            try {
                const response = await fetch('/api/vcp-results');
                const data = await response.json();

                if (data.status === 'initializing') {
                    loading.style.display = 'flex';
                    setTimeout(fetchResults, 10000);
                    return;
                }

                loading.style.display = 'none';
                allStocksData = data.stocks; // Store globally

                // Update Trend Info
                const trendEl = document.getElementById('nifty-trend');
                trendEl.textContent = data.market_trend.uptrend ? 'Bullish 📈' : 'Cautious 📉';
                trendEl.style.color = data.market_trend.uptrend ? 'var(--success)' : 'var(--danger)';

                const sectorEl = document.getElementById('top-sector');
                if (data.sector_rankings.length > 0) {
                    sectorEl.textContent = data.sector_rankings[0].sector;
                }

                document.getElementById('update-info').textContent = 'Last Updated: ' + new Date(data.updated_at).toLocaleString();

                // Update Table
                const body = document.getElementById('vcp-body');
                body.innerHTML = '';

                data.stocks.forEach(s => {
                    const row = document.createElement('tr');
                    const tagClass = s.tag.includes('Breakout') ? 'tag-breakout' : 'tag-high';
                    row.innerHTML = `
                        <td class="ticker clickable-ticker" onclick="showDetails('${s.ticker}')" title="Click to view strategy details">${s.ticker}</td>
                        <td><span class="tag-pill ${tagClass}">${s.tag}</span></td>
                        <td>₹${s.price}</td>
                        <td style="color: var(--warning)">
                            <div>₹${s.resistance}</div>
                            <div style="font-size: 0.8rem; color: var(--text-dim)">${Math.abs(s.details.resistance.pct_below)}% away</div>
                        </td>
                        <td>
                            <div style="font-size: 0.8rem; color: var(--text-dim)">Range:</div>
                            <div style="font-weight: 600; color: #818cf8;">${s.recommended_buy_price || 'N/A'}</div>
                            <div style="font-size: 0.8rem; color: var(--text-dim)">Stop: ₹${s.buy_stop_price || 'N/A'}</div>
                        </td>
                        <td style="color: var(--success); font-weight: 600;">${s.target}</td>
                        <td style="color: var(--danger)">₹${s.stop_loss}</td>
                        <td><strong>${s.score}/7</strong></td>
                    `;
                    body.appendChild(row);
                });

            } catch (err) {
                console.error(err);
            }
        }

        window.onload = fetchResults;
    </script>
</body>

</html>
